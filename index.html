    <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Love Gift Ultra ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#ffd6e5,#ff8fab,#ff4d8d);
}


/* نجوم ولمعات الخلفية */

.spark{
    position:absolute;
    color:white;
    animation:spark 6s linear infinite;
    opacity:.8;
}

@keyframes spark{
    from{
        transform:translateY(100vh) scale(0);
    }

    to{
        transform:translateY(-20vh) scale(1.5);
        opacity:0;
    }
}


/* القلوب */

.heart{
    position:absolute;
    bottom:-50px;
    color:#fff;
    animation:heartMove linear infinite;
    opacity:.8;
}

@keyframes heartMove{

    0%{
        transform:translateY(0) rotate(0);
    }

    100%{
        transform:translateY(-120vh) rotate(360deg);
    }

}


/* الكارت الرئيسي */

.card{

    width:92%;
    max-width:420px;

    padding:35px 25px;

    background:
    rgba(255,255,255,.25);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.4);

    border-radius:40px;

    box-shadow:
    0 25px 70px rgba(120,0,60,.35);

    text-align:center;

    animation:open .8s ease;

    z-index:5;

}


@keyframes open{

from{
    opacity:0;
    transform:scale(.5) rotateY(40deg);
}

to{
    opacity:1;
    transform:scale(1);
}

}


.hidden{
    display:none!important;
}


/* العناوين */

.title{

    color:#9b003d;

    font-size:30px;

    font-weight:900;

    text-shadow:
    0 3px 10px #fff;

    margin:20px 0;

}


.text{

    color:#555;

    font-size:17px;

    line-height:2;

}



/* القفل */

.lock{

    font-size:90px;

    animation:pulse 2s infinite;

}


@keyframes pulse{

50%{
transform:scale(1.15);
}

}



/* الإدخال */

input{

width:100%;

padding:16px;

border:none;

border-radius:40px;

outline:none;

text-align:center;

font-size:18px;

margin:20px 0;

box-shadow:
0 10px 30px #ffb3cc;

}



/* الأزرار */


button{

width:100%;

padding:16px;

border:none;

border-radius:40px;

background:
linear-gradient(45deg,#ff0066,#ff8fab);

color:white;

font-size:18px;

font-weight:bold;

cursor:pointer;

box-shadow:
0 15px 30px rgba(255,0,100,.35);

transition:.3s;

}


button:hover{

transform:translateY(-5px);

}


button:active{

transform:scale(.9);

}


/* الهدية */


.gift{

font-size:110px;

cursor:pointer;

animation:gift 2s infinite;

}


@keyframes gift{

50%{

transform:translateY(-20px) rotate(5deg);

}

}



/* الرسائل */


.message{

background:

rgba(255,255,255,.7);

padding:25px;

border-radius:30px;

line-height:2;

color:#555;

font-size:17px;

box-shadow:

inset 0 0 20px rgba(255,0,100,.1);

}



/* مشغل الأغنية */

.music{

position:fixed;

bottom:20px;

right:20px;

background:#fff;

padding:10px 15px;

border-radius:50px;

z-index:10;

box-shadow:0 5px 20px #ff7aa5;

}


</style>

</head>

<body>


<audio id="song" loop>
<source src="روحي.mp3" type="audio/mpeg">
</audio>


<div class="music" onclick="musicToggle()">
🎵 روحي
</div>


<!-- هنا هكمل الصفحات والسكريبت في الجزء الثاني -->
<!-- شاشة الدخول -->

<div class="card" id="login">
    
    <div class="lock">🔐</div>
    
    <h1 class="title">
        Secret Love ❤️
    </h1>
    
    <p class="text">
        هدية سرية خاصة لملوكة ✨<br>
        اكتبي الرمز لفتح المفاجأة
    </p>
    
    <input id="pass" type="password" placeholder="الرمز السري">
    
    <button onclick="unlock()">
        فتح الهدية 🎁
    </button>
    
    <p id="error"></p>
    
</div>



<!-- الصفحة الرئيسية -->

<div class="card hidden" id="home">
    
    <div class="lock">👑</div>
    
    <h1 class="title">
        أهلاً يا ملك ❤️
    </h1>
    
    <p class="text" id="typing1"></p>
    
    <button onclick="showPage('giftPage')">
        ابدئي الرحلة ✨
    </button>
    
</div>




<!-- صفحة الهدية -->

<div class="card hidden" id="giftPage">
    
    <div class="lock">
        🎁
    </div>
    
    <h1 class="title">
        الصندوق السري
    </h1>
    
    
    <p class="text">
        اضغطي على الصندوق لفتح المفاجأة
    </p>
    
    
    <div class="gift" onclick="openGift()">
        🎁
    </div>
    
    
    <div id="giftResult"></div>
    
    
</div>




<!-- الرسالة -->

<div class="card hidden" id="messagePage">
    
    <div class="lock">
        💌
    </div>
    
    
    <h1 class="title">
        رسالة لك ❤️
    </h1>
    
    
    <div class="message">
        
        <p id="loveText"></p>
        
    </div>
    
    
    <button onclick="showPage('sorryPage')">
        التالي 🥺
    </button>
    
    
</div>





<!-- الاعتذار -->

<div class="card hidden" id="sorryPage">
    
    
    <div class="lock">
        🥺❤️
    </div>
    
    
    <h1 class="title">
        رسالة أخيرة
    </h1>
    
    
    <div class="message">
        
        
        <p id="sorryText"></p>
        
        
    </div>
    
    
    
    <button onclick="showPage('endPage')">
        النهاية 👑
    </button>
    
    
</div>






<!-- النهاية -->


<div class="card hidden" id="endPage">
    
    
    <div class="lock">
        💖
    </div>
    
    
    <h1 class="title">
        تمت الرحلة ✨
    </h1>
    
    
    <p class="text">
        
        شكراً إنك فتحتي الهدية ❤️
        
        <br><br>
        
        أتمنى لك أيام مليئة بالفرح والسعادة 🌹
        
    </p>
    
    
    <button onclick="location.reload()">
        إعادة الهدية 🔄
    </button>
    
    <script>

// إنشاء القلوب والنجوم بالخلفية

for(let i=0;i<35;i++){

    let h=document.createElement("div");

    h.className="heart";

    h.innerHTML="❤";

    h.style.left=Math.random()*100+"%";

    h.style.fontSize=(15+Math.random()*35)+"px";

    h.style.animationDuration=(5+Math.random()*6)+"s";

    document.body.appendChild(h);



    let s=document.createElement("div");

    s.className="spark";

    s.innerHTML="✦";

    s.style.left=Math.random()*100+"%";

    s.style.fontSize=(10+Math.random()*25)+"px";

    s.style.animationDuration=(4+Math.random()*5)+"s";

    document.body.appendChild(s);

}



// فتح الهدية

function unlock(){

let pass=document.getElementById("pass").value;


if(pass==="love"){


document.getElementById("login").classList.add("hidden");

document.getElementById("home").classList.remove("hidden");



let song=document.getElementById("song");

song.play().catch(()=>{});



typing(
"تم فتح الهدية بنجاح ✨<br>حضري قلبك للمفاجأة الجميلة ❤️",
"typing1"
);



}

else{


document.getElementById("error").innerHTML=
"❌ الرمز غير صحيح";


}

}





// التنقل بين الصفحات

function showPage(id){


document.querySelectorAll(".card").forEach(e=>{

e.classList.add("hidden");

});


document.getElementById(id).classList.remove("hidden");



// تشغيل الرسائل عند فتحها

if(id==="messagePage"){

typing(
"ملك ❤️<br><br>حبيت أعملك الهدية دي عشان أقولك إنك شخص غالي عندي، وأتمنى لك دايمًا الفرح والسعادة ✨",
"loveText"
);

}



if(id==="sorryPage"){

typing(
"أنا آسف عشان سيبتك 💔<br><br>بس أنا والله لسه بحبك ❤️<br><br>يمكن حصلت بينا حاجات صعبة، لكن مكانك لسه غالي عندي وأتمنى لك كل الخير والسعادة دائمًا ✨",
"sorryText"
);

}


}





// فتح الصندوق

function openGift(){


document.querySelector(".gift").style.transform=
"scale(1.4) rotate(20deg)";



setTimeout(()=>{


document.getElementById("giftResult").innerHTML=`

<div style="font-size:80px">
💖✨💖
</div>

<p class="text">
تم فتح الصندوق بنجاح ❤️
</p>

<button onclick="showPage('messagePage')">
افتحي الرسالة 💌
</button>

`;

heartExplosion();


},500);



}





// تأثير الكتابة

function typing(text,id){


let box=document.getElementById(id);

box.innerHTML="";


let i=0;


let clean=text.replace(/<br>/g,"\n");


let timer=setInterval(()=>{


if(i<clean.length){


box.innerHTML+=clean[i]
.replace("\n","<br>");

i++;

}

else{

clearInterval(timer);

}


},50);



}




// انفجار القلوب

function heartExplosion(){


for(let i=0;i<25;i++){


let h=document.createElement("div");


h.innerHTML="❤️";


h.style.position="fixed";

h.style.left="50%";

h.style.top="50%";

h.style.fontSize="30px";

h.style.zIndex="99";



let x=(Math.random()-0.5)*500;

let y=(Math.random()-0.5)*500;



h.animate([

{
transform:"translate(0,0)",
opacity:1
},

{
transform:`translate(${x}px,${y}px)`,
opacity:0
}


],{

duration:1200

});



document.body.appendChild(h);



setTimeout(()=>h.remove(),1200);



}



}




// زر الموسيقى

let playing=false;


function musicToggle(){


let song=document.getElementById("song");


if(playing){

song.pause();

playing=false;

}

else{

song.play();

playing=true;

}


}


</script>
</div>
</body>
</html>
